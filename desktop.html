<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Rota RP — Desktop</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>

  <!-- Fontes -->
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ── RESET ──────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── TEMA ───────────────────────────────────────── */
    :root {
      --bg: #f2f2f7;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111111;
      --text2: #555555;
      --text3: #999999;
      --blue: #007AFF;
      --green: #34C759;
      --orange: #FF9500;
      --red: #FF3B30;
      --purple: #AF52DE;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --surface: #2c2c2e;
        --border: #3a3a3c;
        --text: #ffffff;
        --text2: #ebebf5bb;
        --text3: #ebebf566;
      }
    }

    html, body { height: 100%; font-family: 'IBM Plex Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── LOGIN ──────────────────────────────────────── */
    #screen-login {
      position: fixed; inset: 0; z-index: 999;
      background: #111;
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      width: 360px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      padding: 36px 32px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .login-titulo { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .login-sub    { font-size: 12px; color: rgba(255,255,255,.4); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    .login-input  {
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15);
      border-radius: 10px; padding: 12px 16px; color: #fff; font-size: 14px;
      font-family: inherit; outline: none; width: 100%;
    }
    .login-input::placeholder { color: rgba(255,255,255,.3); }
    .login-btn {
      background: #fff; color: #111; border: none; border-radius: 10px;
      padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .login-btn:disabled { opacity: .5; }
    .login-erro { font-size: 13px; color: #ff6b6b; text-align: center; min-height: 18px; }
    .login-versao { font-size: 11px; color: rgba(255,255,255,.2); text-align: center; }

    /* ── LAYOUT PRINCIPAL ───────────────────────────── */
    #app {
      display: none;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }

    /* ── HEADER ─────────────────────────────────────── */
    #header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    #header-title { font-size: 17px; font-weight: 800; letter-spacing: -.3px; }
    #header-user  { font-size: 13px; color: var(--text3); }
    #btn-logout   { background: none; border: none; color: var(--red); font-size: 13px; cursor: pointer; font-family: inherit; }

    /* ── TABS ───────────────────────────────────────── */
    #tabs {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex; gap: 4px;
      flex-shrink: 0;
    }
    .tab {
      background: none; border: none; padding: 12px 20px;
      font-family: inherit; font-size: 14px; font-weight: 600;
      color: var(--text3); cursor: pointer;
      border-bottom: 2px solid transparent; transition: .2s;
    }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .tab:hover  { color: var(--text); }

    /* ── CONTEÚDO ───────────────────────────────────── */
    #content { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* ── SIDEBAR ────────────────────────────────────── */
    #sidebar {
      width: 300px; flex-shrink: 0;
      display: flex; flex-direction: column;
      border-right: 1px solid var(--border); overflow: hidden;
    }
    #search-wrap {
      padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
      background: var(--surface);
    }
    #search-box {
      background: var(--bg); border-radius: 10px; padding: 7px 12px;
      display: flex; align-items: center; gap: 7px;
    }
    #search-box input {
      flex: 1; background: none; border: none; outline: none;
      font-size: 13px; color: var(--text); font-family: inherit;
    }
    #search-box input::placeholder { color: var(--text3); }
    #client-list { flex: 1; overflow-y: auto; }

    /* ── MAPA ───────────────────────────────────────── */
    #map-wrap { flex: 1; min-width: 0; overflow: hidden; position: relative; display: flex; flex-direction: column; }
    #map      { flex: 1; width: 100%; height: 100%; }

    /* ── DETALHE ────────────────────────────────────── */
    #detail {
      width: 340px; flex-shrink: 0;
      display: flex; flex-direction: column;
      border-left: 1px solid var(--border); overflow-y: auto;
      background: var(--surface);
    }
    #detail-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--text3); text-align: center; padding: 20px;
    }

    /* ── RELATÓRIO ──────────────────────────────────── */
    #report { flex: 1; overflow-y: auto; padding: 20px; display: none; background: var(--bg); }

    /* ── TOAST ──────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #111; color: #fff; padding: 10px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 500; opacity: 0; transition: all .3s; z-index: 999;
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (prefers-color-scheme: dark) { #toast { background: #fff; color: #111; } }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-box">
    <div class="login-titulo">Minha Rota RP</div>
    <div class="login-sub">Gestão comercial</div>
    <input class="login-input" id="login-email" type="email" placeholder="seu@email.com" autocomplete="email">
    <input class="login-input" id="login-senha" type="password" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') fazerLogin()">
    <div class="login-erro" id="login-erro"></div>
    <button class="login-btn" id="btn-login" onclick="fazerLogin()">Entrar</button>
    <div class="login-versao">v1.0 desktop</div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- Header -->
  <div id="header">
    <div id="header-title">Minha Rota RP</div>
    <div style="display:flex;align-items:center;gap:16px">
      <span id="header-user"></span>
      <button id="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>
  </div>

  <!-- Tabs -->
  <div id="tabs">
    <button class="tab active" onclick="showTab('mapa')">🗺 Mapa</button>
    <button class="tab"        onclick="showTab('relatorio')">📊 Relatório</button>
  </div>

  <!-- Conteúdo -->
  <div id="content">

    <!-- Sidebar -->
    <div id="sidebar">
      <div id="search-wrap">
        <div id="search-box">
          <span style="font-size:13px">🔍</span>
          <input type="search" id="search-input" placeholder="Buscar cliente..." oninput="renderList()">
        </div>
      </div>
      <div id="client-list">
        <!-- preenchido por renderList() -->
      </div>
    </div>

    <!-- Mapa -->
    <div id="map-wrap">
      <div id="map"></div>
    </div>

    <!-- Detalhe -->
    <div id="detail">
      <div id="detail-empty">Selecione um cliente<br>para ver os detalhes</div>
    </div>

  </div>

  <!-- Relatório (oculto por padrão) -->
  <div id="report">
    <!-- preenchido por renderReport() -->
  </div>

</div>

<div id="toast"></div>

<script>
// ── SUPABASE ──────────────────────────────────────────────
const { createClient } = window.supabase;
const sb = createClient(
  'https://fiwpmhrjbovnazagjcjf.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpd3BtaHJqYm92bmF6YWdqY2pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNDI1MzAsImV4cCI6MjA4OTcxODUzMH0.pHgiICZzqoeLq5uez8_3WwfurHuouV_Cp9kz1ThRsFs'
);

// ── ESTADO ────────────────────────────────────────────────
let currentUser = null;
let clientes    = [];
let gmap        = null;
let activeId    = null;

// ── GOOGLE MAPS ───────────────────────────────────────────
window.initMap = function () {
  gmap = new google.maps.Map(document.getElementById('map'), {
    center: { lat: -26.5, lng: -49.0 },
    zoom: 8,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
    styles: [
      { elementType: 'geometry',            stylers: [{ color: '#1a1a1e' }] },
      { elementType: 'labels.text.stroke',  stylers: [{ color: '#1a1a1e' }] },
      { elementType: 'labels.text.fill',    stylers: [{ color: '#888888' }] },
      { featureType: 'road', elementType: 'geometry',          stylers: [{ color: '#2d2d32' }] },
      { featureType: 'road', elementType: 'labels.text.fill',  stylers: [{ color: '#666666' }] },
      { featureType: 'water', elementType: 'geometry',         stylers: [{ color: '#111118' }] },
      { featureType: 'poi',     stylers: [{ visibility: 'off' }] },
      { featureType: 'transit', stylers: [{ visibility: 'off' }] },
      { featureType: 'administrative.locality', elementType: 'labels.text.fill', stylers: [{ color: '#aaaaaa' }] }
    ]
  });
  if (clientes.length > 0) renderMapMarkers();
};

(function loadMapsScript() {
  const s = document.createElement('script');
  s.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyA8MEv3kZLzuEbykwI9dfqfw3_R9udDTWo&callback=initMap&loading=async';
  s.async = true; s.defer = true;
  document.head.appendChild(s);
})();

// ── AUTH ──────────────────────────────────────────────────
async function iniciarApp() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      currentUser = session.user;
      mostrarApp();
    } else {
      mostrarLogin();
    }
  } catch(e) {
    mostrarLogin();
  }

  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      currentUser = session.user;
      mostrarApp();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      mostrarLogin();
    }
  });
}

async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  const btn   = document.getElementById('btn-login');
  const erro  = document.getElementById('login-erro');
  if (!email || !senha) { erro.textContent = 'Preencha e-mail e senha.'; return; }
  btn.disabled = true; btn.textContent = 'Entrando...'; erro.textContent = '';
  const { error } = await sb.auth.signInWithPassword({ email, password: senha });
  if (error) {
    erro.textContent = 'E-mail ou senha incorretos.';
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

function fazerLogout() { sb.auth.signOut(); }

function mostrarLogin() {
  document.getElementById('screen-login').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function mostrarApp() {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('header-user').textContent = currentUser?.email ?? '';
  loadDemo();
}

// ── TABS ──────────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const isRelatorio = tab === 'relatorio';
  document.getElementById('content').style.display = isRelatorio ? 'none' : 'flex';
  document.getElementById('report').style.display  = isRelatorio ? 'block' : 'none';
  if (isRelatorio) renderReport();
}

// ── LISTA ─────────────────────────────────────────────────
function renderList() {
  const q    = document.getElementById('search-input').value.toLowerCase();
  const list = document.getElementById('client-list');
  const filtered = clientes.filter(c =>
    !q || c.nome.toLowerCase().includes(q) || (c.cidade || '').toLowerCase().includes(q)
  );

  if (!filtered.length) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">Nenhum cliente encontrado</div>';
    return;
  }

  list.innerHTML = filtered.map(c => {
    const status = getStatus(c);
    const cores  = { today: '#34C759', green: '#007AFF', blue: '#FF9500', red: '#FF3B30', purple: '#AF52DE' };
    const cor    = cores[status] || '#999';
    return `<div onclick="selectCliente(${c.id})" style="padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:10px;align-items:center;transition:.1s${activeId==c.id?' background:var(--bg)':''}" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=activeId==${c.id}?'var(--bg)':''">
      <div style="width:8px;height:8px;border-radius:50%;background:${cor};flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.nome}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${c.cidade || ''}</div>
      </div>
    </div>`;
  }).join('');
}

function getStatus(c) {
  if (!c.ultimaVisita) return 'purple';
  const dias = Math.floor((new Date() - new Date(c.ultimaVisita)) / 86400000);
  if (c.visitadoHoje) return 'today';
  if (dias <= 30)  return 'green';
  if (dias <= 60)  return 'blue';
  return 'red';
}

// ── SELECIONAR CLIENTE ────────────────────────────────────
function selectCliente(id) {
  activeId = id;
  const c = clientes.find(x => x.id === id);
  if (!c) return;
  renderList();
  renderDetail(c);
  if (gmap && c.lat && c.lng) {
    gmap.panTo({ lat: c.lat, lng: c.lng });
    gmap.setZoom(14);
  }
}

function renderDetail(c) {
  const status = getStatus(c);
  const labels = { today:'Visitado hoje', green:'Até 1 mês', blue:'1–2 meses', red:'Mais de 2 meses', purple:'Novo' };
  const cores  = { today:'#34C759', green:'#007AFF', blue:'#FF9500', red:'#FF3B30', purple:'#AF52DE' };
  const detail = document.getElementById('detail');
  detail.innerHTML = `
    <div style="padding:16px;border-bottom:1px solid var(--border)">
      <div style="font-size:11px;font-weight:700;color:${cores[status]};text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">${labels[status]}</div>
      <div style="font-size:17px;font-weight:700;color:var(--text);margin-bottom:3px">${c.nome}</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:3px">${c.cnpj || ''}</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:12px">📍 ${c.cidade || ''}</div>
      <div style="display:flex;gap:8px">
        <button onclick="doCheckin(${c.id})" ${c.visitadoHoje?'disabled':''} style="flex:1;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;opacity:${c.visitadoHoje?'.5':'1'}">
          ${c.visitadoHoje ? '✓ Visitado às '+c.horaHoje : '✓ Check-in'}
        </button>
        <button onclick="abrirMaps(${c.id})" style="background:var(--bg);border:none;border-radius:10px;padding:10px 14px;font-size:16px;cursor:pointer">↗</button>
      </div>
    </div>
    <div style="padding:14px 16px">
      <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Endereço</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.5">${c.endereco || '—'}</div>
      ${c.ultimaVisita ? `
      <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px">Última visita</div>
      <div style="font-size:13px;color:var(--text2)">${formatDate(c.ultimaVisita)}</div>
      ${c.ultimaObs ? `<div style="font-size:13px;color:var(--text);margin-top:6px;background:var(--bg);padding:8px 10px;border-radius:8px;line-height:1.4">${c.ultimaObs}</div>` : ''}
      ` : ''}
    </div>`;
}

function formatDate(iso) {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function abrirMaps(id) {
  const c = clientes.find(x => x.id === id);
  if (!c) return;
  window.open('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(c.endereco + ', ' + c.cidade), '_blank');
}

// ── CHECK-IN ──────────────────────────────────────────────
async function doCheckin(id) {
  const c = clientes.find(x => x.id === id);
  if (!c || c.visitadoHoje) return;
  const hora  = new Date().toTimeString().slice(0, 5);
  const data  = new Date().toISOString().slice(0, 10);
  c.visitadoHoje = true; c.horaHoje = hora;
  renderDetail(c); renderList();
  if (currentUser) {
    try {
      await sb.from('visitas').insert({ id_cliente: String(c.id), nome_cliente: c.nome, cidade: c.cidade, data, hora, obs: '', rep_id: currentUser.id });
    } catch(e) { console.log('Erro ao salvar check-in:', e); }
  }
  showToast('✓ Check-in salvo — ' + hora);
}

// ── MAPA ──────────────────────────────────────────────────
function renderMapMarkers() {
  if (!gmap) return;
  const cores = { today: '#fbbf24', green: '#4ade80', blue: '#60a5fa', red: '#f87171', purple: '#c084fc' };
  clientes.filter(c => c.lat && c.lng).forEach(c => {
    const status = getStatus(c);
    const marker = new google.maps.Marker({
      position: { lat: c.lat, lng: c.lng },
      map: gmap,
      title: c.nome,
      icon: { path: google.maps.SymbolPath.CIRCLE, scale: 7, fillColor: cores[status], fillOpacity: 1, strokeColor: '#fff', strokeWeight: 1.5 }
    });
    marker.addListener('click', () => selectCliente(c.id));
  });
}

// ── RELATÓRIO ─────────────────────────────────────────────
function renderReport() {
  const hoje = new Date();
  const total   = clientes.length;
  const visitadosHoje = clientes.filter(c => c.visitadoHoje).length;
  const ate1mes = clientes.filter(c => { if (!c.ultimaVisita) return false; return Math.floor((hoje - new Date(c.ultimaVisita)) / 86400000) <= 30; }).length;
  const ate2mes = clientes.filter(c => { if (!c.ultimaVisita) return false; const d = Math.floor((hoje - new Date(c.ultimaVisita)) / 86400000); return d > 30 && d <= 60; }).length;
  const atrasados = clientes.filter(c => { if (!c.ultimaVisita) return false; return Math.floor((hoje - new Date(c.ultimaVisita)) / 86400000) > 60; }).length;
  const novos    = clientes.filter(c => !c.ultimaVisita).length;

  document.getElementById('report').innerHTML = `
    <div style="max-width:900px">
      <h2 style="font-size:20px;font-weight:800;margin-bottom:20px">📊 Relatório</h2>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px">
        ${[
          ['Total', total, '#007AFF'],
          ['Hoje', visitadosHoje, '#34C759'],
          ['Até 1 mês', ate1mes, '#007AFF'],
          ['1–2 meses', ate2mes, '#FF9500'],
          ['+2 meses', atrasados, '#FF3B30'],
          ['Novos', novos, '#AF52DE'],
        ].map(([l, v, cor]) => `
          <div style="background:var(--surface);border-radius:14px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)">
            <div style="font-size:28px;font-weight:800;color:${cor}">${v}</div>
            <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;margin-top:4px">${l}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── DADOS ─────────────────────────────────────────────────
function loadDemo() {
  clientes = [
  {id:62007,nome:"Juarez Marcos Devigili",cnpj:"49.802.458/0001-53",cidade:"Balneário Barra do Sul - SC",endereco:"Avenida Araquari, 487 - Salinas - 89247-000",ultimaVisita:"2025-10-13",ultimaObs:"",lat:-26.4797746,lng:-48.6179668},
  {id:49144,nome:"Cintia Farias",cnpj:"50.858.203/0001-91",cidade:"Garuva - SC",endereco:"Av Paraná, 953 - Centro - 89248-000",ultimaVisita:"2026-02-24",ultimaObs:"",lat:-26.0289076,lng:-48.8600793},
