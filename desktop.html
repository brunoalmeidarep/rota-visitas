<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Minha Rota RP — Desktop</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="desktop.css">
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────────────────── -->
<div id="screen-login">
  <div class="login-box">
    <div class="login-logo">Minha Rota RP</div>
    <div class="login-sub">Gestão Comercial · Desktop</div>
    <input class="login-input" id="login-email" type="email"
      placeholder="seu@email.com" autocomplete="email">
    <input class="login-input" id="login-senha" type="password"
      placeholder="Senha" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') fazerLogin()">
    <div class="login-erro" id="login-erro"></div>
    <button class="login-btn" id="btn-login" onclick="fazerLogin()">Entrar</button>
    <div class="login-versao">v2.0 desktop · Mundo do Rep</div>
  </div>
</div>

<!-- ── APP ────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div id="header-logo">Minha Rota RP</div>
    <div id="header-date"></div>

    <div id="header-search">
      <span style="font-size:13px;color:var(--text3)">🔍</span>
      <input type="search" id="search-input" placeholder="Buscar cliente ou cidade...">
    </div>

    <div id="header-counters">
      <!-- renderizado por renderCounters() -->
    </div>

    <div id="header-right">
      <span id="header-user"></span>
      <button class="hdr-btn primary" onclick="openCadastro()">+ Novo cliente</button>
      <button class="hdr-btn" onclick="localStorage.setItem('force_mobile','1');window.location.href='index.html'" title="Acessar a versão para celular">📱 Versão Mobile</button>
      <button class="hdr-btn danger" onclick="fazerLogout()">Sair</button>
    </div>
  </header>

  <!-- TABS -->
  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="mapa"      onclick="showTab('mapa')">🗺 Mapa &amp; Lista</button>
    <button class="tab-btn"        data-tab="relatorio" onclick="showTab('relatorio')">📊 Relatório</button>
    <button class="tab-btn"        data-tab="tarefas"   onclick="showTab('tarefas'); renderTarefas()">📋 Tarefas</button>
    <button class="tab-btn"        data-tab="admin"     id="tab-admin-btn"
      onclick="showTab('admin'); carregarReps()" style="display:none">⚙ Admin</button>
  </nav>

  <!-- CONTEÚDO -->
  <div id="main">

    <!-- ── TAB MAPA & LISTA ──────────────────────────────────────── -->
    <div id="tab-mapa" class="tab-pane active">

      <!-- Sidebar esquerda -->
      <aside id="sidebar">

        <!-- Toggle Clientes / Planejar -->
        <div id="sidebar-toggle">
          <button class="sb-mode-btn active" id="sb-btn-lista"
            onclick="setSidebarMode('lista')">Clientes</button>
          <button class="sb-mode-btn" id="sb-btn-planner"
            onclick="setSidebarMode('planner')">🗓 Planejar</button>
        </div>

        <!-- Modo lista (padrão) -->
        <div id="sidebar-lista">
          <div id="filter-bar">
            <button class="filter-pill active" onclick="setFilter('all')">Todos</button>
            <button class="filter-pill f-today"  onclick="setFilter('today')">Hoje</button>
            <button class="filter-pill f-green"  onclick="setFilter('green')">≤1m</button>
            <button class="filter-pill f-blue"   onclick="setFilter('blue')">1–2m</button>
            <button class="filter-pill f-red"    onclick="setFilter('red')">+2m</button>
            <button class="filter-pill f-purple" onclick="setFilter('purple')">Novos</button>
          </div>
          <div id="city-filter-wrap">
            <select id="city-select">
              <option value="">Todas as cidades</option>
            </select>
          </div>
          <div id="client-list">
            <div class="list-empty">Carregando...</div>
          </div>
        </div>

        <!-- Modo planner (conteúdo gerado por JS) -->
        <div id="planner-panel" style="display:none;flex-direction:column;flex:1;overflow:hidden;"></div>

      </aside>

      <!-- Mapa central -->
      <div id="map-wrap">
        <div id="map"></div>
        <div id="map-overlay">Carregando mapa...</div>
      </div>

      <!-- Painel de detalhe -->
      <aside id="detail-panel">
        <div id="detail-empty">
          <div class="empty-icon">👈</div>
          <p>Selecione um cliente<br>na lista ou no mapa<br>para ver os detalhes</p>
        </div>
        <div id="detail-body"></div>
        <!-- Resultado do planejamento de rota -->
        <div id="rota-result" style="display:none;flex-direction:column;flex:1;overflow:hidden;"></div>
      </aside>

    </div><!-- /tab-mapa -->

    <!-- ── TAB RELATÓRIO ─────────────────────────────────────────── -->
    <div id="tab-relatorio" class="tab-pane" style="flex-direction:column">
        <div id="rep-nav">
          <button class="rep-nav-btn" id="rep-nav-prev" onclick="navegarMes(-1)">‹</button>
          <div id="rep-mes-titulo" style="flex:1;text-align:center;font-size:15px;font-weight:700"></div>
          <button class="rep-nav-btn" id="rep-nav-next" onclick="navegarMes(1)">›</button>
          <div class="rep-filtro-tabs">
            <button class="rep-ftab" onclick="setRelFiltro('hoje', this)">Hoje</button>
            <button class="rep-ftab" onclick="setRelFiltro('semana', this)">Semana</button>
            <button class="rep-ftab active" onclick="setRelFiltro('mes', this)">Mês</button>
          </div>
        </div>
        <div id="rep-body"></div>

        <!-- painel de detalhe — substitui rep-body quando aberto -->
        <div id="rep-detail" style="display:none;flex:1;overflow:hidden;flex-direction:column;min-height:0">
          <div id="rep-detail-header">
            <button class="rep-detail-back" onclick="fecharDetalheRelatorio()">← Voltar ao relatório</button>
            <h2 id="rep-detail-titulo"></h2>
            <div id="rep-detail-meta"></div>
          </div>
          <div id="rep-detail-body"></div>
        </div>

    </div><!-- /tab-relatorio -->

    <!-- ── TAB TAREFAS ───────────────────────────────────────────── -->
    <div id="tab-tarefas" class="tab-pane">
      <div id="tarefas-header">
        <h2>📋 Tarefas do dia</h2>
        <p id="tarefas-date"></p>
      </div>
      <div id="tarefas-input-wrap">
        <input type="text" id="tarefas-input" placeholder="Nova tarefa... (Enter para adicionar)">
        <button id="tarefas-add-btn" onclick="adicionarTarefa()">Adicionar</button>
      </div>
      <div id="tarefas-list"></div>
    </div><!-- /tab-tarefas -->

    <!-- ── TAB ADMIN ─────────────────────────────────────────────── -->
    <div id="tab-admin" class="tab-pane">
      <div class="admin-section">
        <h3>Representantes</h3>
        <div id="reps-list"><div class="list-empty">Carregando...</div></div>
      </div>
      <div class="admin-section">
        <h3>Criar representante</h3>
        <div class="admin-form">
          <input class="admin-input" id="admin-nome"  type="text"     placeholder="Nome completo">
          <input class="admin-input" id="admin-email" type="email"    placeholder="E-mail">
          <input class="admin-input" id="admin-senha" type="password" placeholder="Senha inicial">
          <button class="admin-submit" id="admin-submit" onclick="criarRep()">Criar representante</button>
          <div class="admin-msg" id="admin-msg"></div>
        </div>
      </div>
    </div><!-- /tab-admin -->

  </div><!-- /main -->

</div><!-- /app -->

<!-- ── MODAL CADASTRO DE CLIENTE ──────────────────────────────────── -->
<div id="modal-overlay" onclick="if(event.target===this) closeCadastro()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeCadastro()">×</button>
    <div class="modal-title">Novo cliente</div>

    <form id="cad-form" onsubmit="return false">

      <div class="campo-row">
        <div>
          <label class="campo-label">Nome / Fantasia *</label>
          <input class="campo-input" id="cad-nome" type="text" placeholder="Ex: Julio Mat. Construção" required>
        </div>
        <div>
          <label class="campo-label">Razão social</label>
          <input class="campo-input" id="cad-razao" type="text" placeholder="Razão social completa">
        </div>
      </div>

      <div class="campo-row">
        <div>
          <label class="campo-label">Comprador / Contato</label>
          <input class="campo-input" id="cad-comprador" type="text" placeholder="Nome do comprador">
        </div>
        <div>
          <label class="campo-label">Fantasia (apelido)</label>
          <input class="campo-input" id="cad-fantasia" type="text" placeholder="Apelido da loja">
        </div>
      </div>

      <div class="campo-row">
        <div>
          <label class="campo-label">CNPJ</label>
          <input class="campo-input" id="cad-cnpj" type="text" placeholder="00.000.000/0001-00">
        </div>
        <div>
          <label class="campo-label">Telefone / WhatsApp</label>
          <input class="campo-input" id="cad-tel" type="tel" placeholder="(47) 99999-9999">
        </div>
      </div>

      <div>
        <label class="campo-label">Segmento</label>
        <div class="seg-pills" id="seg-pills-wrap"></div>
      </div>

      <div>
        <label class="campo-label">CEP</label>
        <div class="campo-cep-row">
          <input class="campo-input" id="cad-cep" type="text" placeholder="00000-000" maxlength="9">
          <button type="button" class="btn-buscar-cep" id="btn-buscar-cep" onclick="buscarCEP()">Buscar</button>
        </div>
        <div class="cep-status" id="cad-cep-status"></div>
      </div>

      <div>
        <label class="campo-label">Endereço</label>
        <input class="campo-input" id="cad-endereco" type="text" placeholder="Rua, número, bairro">
      </div>

      <div>
        <label class="campo-label">Cidade *</label>
        <input class="campo-input" id="cad-cidade" type="text" placeholder="Ex: Jaraguá do Sul - SC">
      </div>

      <div>
        <label class="campo-label">Localização GPS</label>
        <button type="button" class="btn-gps" id="btn-cad-gps" onclick="usarGPS()">
          📍 Usar localização atual
        </button>
        <div class="gps-status" id="cad-gps-status"></div>
      </div>

    </form>

    <div class="modal-footer">
      <button class="btn-cancel-modal" onclick="closeCadastro()">Cancelar</button>
      <button class="btn-salvar-modal" id="btn-salvar-cad" onclick="salvarCliente()">Salvar cliente</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- JS principal -->
<script src="desktop.js"></script>

</body>
</html>
